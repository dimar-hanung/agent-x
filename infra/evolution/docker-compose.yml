services:
  evolution-api:
    container_name: agentx_evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    # Host network so webhooks can reach AgentX on 127.0.0.1:3000.
    # Bridge → host:3000 times out on this server (Docker hairpin).
    network_mode: host
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started

  evolution-postgres:
    container_name: agentx_evolution_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_local_pass
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-redis:
    container_name: agentx_evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - evolution_redis:/data

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:
