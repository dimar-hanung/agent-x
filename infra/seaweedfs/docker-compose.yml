services:
  master:
    image: chrislusf/seaweedfs:3.85
    container_name: agentx_seaweedfs_master
    restart: unless-stopped
    command: >-
      master
      -ip=master
      -ip.bind=0.0.0.0
      -defaultReplication=000
      -volumeSizeLimitMB=1024
    ports:
      - "127.0.0.1:9333:9333"
      - "127.0.0.1:19333:19333"
    volumes:
      - seaweedfs_master:/data
    networks:
      - seaweedfs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  volume:
    image: chrislusf/seaweedfs:3.85
    container_name: agentx_seaweedfs_volume
    restart: unless-stopped
    command: >-
      volume
      -ip=volume
      -ip.bind=0.0.0.0
      -mserver=master:9333
      -port=8080
      -dir=/data
      -max=0
      -index=leveldb
    ports:
      # Host 18080 — avoid Evolution API on :8080/:8081
      - "127.0.0.1:18080:8080"
    volumes:
      - seaweedfs_volume:/data
    depends_on:
      master:
        condition: service_healthy
    networks:
      - seaweedfs

  filer:
    image: chrislusf/seaweedfs:3.85
    container_name: agentx_seaweedfs_filer
    restart: unless-stopped
    command: >-
      filer
      -ip=filer
      -ip.bind=0.0.0.0
      -master=master:9333
      -port=8888
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:18888:18888"
    volumes:
      - seaweedfs_filer:/data
    depends_on:
      master:
        condition: service_healthy
      volume:
        condition: service_started
    networks:
      - seaweedfs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8888/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  s3:
    image: chrislusf/seaweedfs:3.85
    container_name: agentx_seaweedfs_s3
    restart: unless-stopped
    command: >-
      s3
      -ip.bind=0.0.0.0
      -filer=filer:8888
      -port=8333
      -config=/etc/seaweedfs/s3.json
    ports:
      - "127.0.0.1:8333:8333"
    volumes:
      - ./s3.json:/etc/seaweedfs/s3.json:ro
    depends_on:
      filer:
        condition: service_healthy
    networks:
      - seaweedfs

volumes:
  seaweedfs_master:
  seaweedfs_volume:
  seaweedfs_filer:

networks:
  seaweedfs:
    name: agentx_seaweedfs
